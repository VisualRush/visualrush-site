<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisualRush — Turning ideas into impact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- JOUW BESTAANDE SITE (NIET AANGEPAST) -->
  <!-- (alles wat je al had blijft exact hetzelfde hierboven) -->

  <!-- FOOTER -->
  <footer>
    <p>© 2026 VisualRush. All rights reserved.</p>
    <p>📧 gamingalexander230@gmail.com</p>
    <p class="lang" data-en="Follow us:" data-nl="Volg ons:">Volg ons: 
      <a href="#">Instagram</a> | 
      <a href="#">Discord</a>
    </p>
  </footer>

  <!-- CHAT HTML -->
  <button id="vr-btn">💬</button>
  <div id="vr-chat"></div>

  <!-- JOUW BESTAANDE LANGUAGE SCRIPT -->
  <script>
    const enBtn = document.getElementById('en');
    const nlBtn = document.getElementById('nl');
    const elements = document.querySelectorAll('.lang');

    enBtn.addEventListener('click', () => {
      elements.forEach(el => el.textContent = el.getAttribute('data-en'));
      enBtn.classList.add('active');
      nlBtn.classList.remove('active');
    });

    nlBtn.addEventListener('click', () => {
      elements.forEach(el => el.textContent = el.getAttribute('data-nl'));
      nlBtn.classList.add('active');
      enBtn.classList.remove('active');
    });
  </script>

  <!-- CHAT SCRIPT -->
  <script>
  const APP_ID = "YOUR_APP_ID";
  const API_KEY = "YOUR_PUBLIC_API_KEY";

  let ticketId = localStorage.getItem("vr_ticket_id");
  let clientName = localStorage.getItem("vr_name");
  let clientEmail = localStorage.getItem("vr_email");

  const chat = document.getElementById("vr-chat");
  const btn = document.getElementById("vr-btn");

  btn.onclick = () => {
    chat.classList.toggle("open");
    if (chat.classList.contains("open")) {
      if (ticketId) renderChat();
      else renderSetup();
    }
  };

  function renderSetup() {
    chat.innerHTML = `
      <div id="vr-header">VisualRush Support</div>
      <div id="vr-setup">
        <input id="vr-name" placeholder="Naam">
        <input id="vr-email" placeholder="Email">
        <textarea id="vr-msg" placeholder="Waarmee kunnen we helpen?"></textarea>
        <button id="vr-start">Start chat</button>
      </div>
    `;
    document.getElementById("vr-start").onclick = startChat;
  }

  async function startChat() {
    const name = document.getElementById("vr-name").value;
    const email = document.getElementById("vr-email").value;
    const msg = document.getElementById("vr-msg").value;

    if (!name || !email) return alert("Vul alles in");

    const res = await fetch(`https://api.base44.com/api/apps/${APP_ID}/entities/SupportTicket`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY
      },
      body: JSON.stringify({
        client_name: name,
        client_email: email,
        subject: "Website chat",
        messages: msg ? [{
          sender: email,
          sender_name: name,
          content: msg,
          timestamp: new Date().toISOString(),
          is_client: true
        }] : [],
        status: "Open"
      })
    });

    const data = await res.json();

    ticketId = data.id;
    clientName = name;
    clientEmail = email;

    localStorage.setItem("vr_ticket_id", ticketId);
    localStorage.setItem("vr_name", name);
    localStorage.setItem("vr_email", email);

    renderChat();
  }

  function renderChat() {
    chat.innerHTML = `
      <div id="vr-header">VisualRush Support</div>
      <div id="vr-msgs"></div>
      <form id="vr-form">
        <input id="vr-input" placeholder="Typ een bericht...">
        <button id="vr-send">→</button>
      </form>
    `;

    document.getElementById("vr-form").addEventListener("submit", sendMessage);

    document.getElementById("vr-input").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage(e);
      }
    });

    loadMessages();
  }

  async function loadMessages() {
    if (!ticketId) return;

    const res = await fetch(`https://api.base44.com/api/apps/${APP_ID}/entities/SupportTicket/${ticketId}`, {
      headers: { "x-api-key": API_KEY }
    });

    const data = await res.json();

    const container = document.getElementById("vr-msgs");
    if (!container) return;

    container.innerHTML = "";

    (data.messages || []).forEach(m => {
      const el = document.createElement("div");
      el.className = "vr-msg " + (m.is_client ? "client" : "agent");
      el.textContent = m.content;
      container.appendChild(el);
    });

    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage(e) {
    e.preventDefault();

    const input = document.getElementById("vr-input");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";

    const res = await fetch(`https://api.base44.com/api/apps/${APP_ID}/entities/SupportTicket/${ticketId}`, {
      headers: { "x-api-key": API_KEY }
    });

    const ticket = await res.json();

    const updatedMessages = [
      ...(ticket.messages || []),
      {
        sender: clientEmail,
        sender_name: clientName,
        content: text,
        timestamp: new Date().toISOString(),
        is_client: true
      }
    ];

    await fetch(`https://api.base44.com/api/apps/${APP_ID}/entities/SupportTicket/${ticketId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY
      },
      body: JSON.stringify({
        messages: updatedMessages,
        status: "Open"
      })
    });

    loadMessages();
  }

  setInterval(() => {
    if (chat.classList.contains("open")) loadMessages();
  }, 4000);
  </script>

</body>
</html>
